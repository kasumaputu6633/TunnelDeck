{{define "fragment"}}
{{if .UpdateAvailable}}
<div class="flex items-center gap-3 bg-amber-950 border border-amber-800 rounded p-3">
    <div class="w-3 h-3 rounded-full bg-amber-400 animate-pulse"></div>
    <div class="flex-1">
        <div class="text-sm font-semibold text-amber-200">Restart in progress…</div>
        <div class="text-xs text-amber-300/80">the service is picking up the new binary; this widget will go green once it's back up</div>
    </div>
</div>
{{else}}
<div class="flex items-center gap-3 bg-emerald-950 border border-emerald-700 rounded p-3">
    <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
    <div class="flex-1">
        <div class="text-sm font-semibold text-emerald-200">Up to date</div>
        <div class="text-xs text-emerald-300/80">{{.CurrentVersion}} &middot; sha {{if .CurrentSHA}}{{slice .CurrentSHA 0 12}}{{else}}unknown{{end}}</div>
    </div>
</div>
{{end}}
{{end}}
