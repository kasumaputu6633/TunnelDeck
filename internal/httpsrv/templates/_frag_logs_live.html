{{define "fragment"}}
<tbody id="logs-tbody"
       hx-get="/logs/fragment?page={{.Pagination.Page}}&per={{.Pagination.PerPage}}"
       hx-trigger="every 10s"
       hx-swap="outerHTML">
{{range .Audit}}
    <tr class="border-t border-slate-700 hover:bg-slate-700/30 transition-colors">
        <td class="px-3 py-1 text-slate-400 font-mono text-xs">{{.TS.Format "2006-01-02 15:04:05"}}</td>
        <td class="px-3 py-1 text-xs">{{.Actor}}</td>
        <td class="px-3 py-1 text-emerald-300 font-mono text-xs">{{friendlyAction .Action}}</td>
        <td class="px-3 py-1 font-mono text-xs">{{.Target}}</td>
        <td class="px-3 py-1 text-xs text-slate-400 font-mono truncate max-w-xs">{{.Detail}}</td>
    </tr>
{{else}}
    <tr>
        <td colspan="5" class="text-center py-10">
            <div class="text-slate-500 text-2xl mb-2">📋</div>
            <div class="text-slate-300 text-sm font-medium">No audit entries yet</div>
            <div class="text-slate-500 text-xs mt-1">Actions like adding nodes, applying nftables, and updating settings will appear here.</div>
        </td>
    </tr>
{{end}}
</tbody>
{{end}}
