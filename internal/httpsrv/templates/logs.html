{{define "content"}}
<h1 class="text-lg font-semibold mb-4">Audit log</h1>
<div class="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden">
    <table class="w-full text-sm">
        <thead class="text-xs text-slate-400 bg-slate-900"><tr>
            <th class="text-left px-3 py-2">When</th>
            <th class="text-left px-3 py-2">Actor</th>
            <th class="text-left px-3 py-2">Action</th>
            <th class="text-left px-3 py-2">Target</th>
            <th class="text-left px-3 py-2">Detail</th>
        </tr></thead>
        <tbody>
        {{range .Data.Audit}}
            <tr class="border-t border-slate-700">
                <td class="px-3 py-1 text-slate-400 font-mono">{{.TS.Format "2006-01-02 15:04:05"}}</td>
                <td class="px-3 py-1">{{.Actor}}</td>
                <td class="px-3 py-1 text-emerald-300 font-mono">{{.Action}}</td>
                <td class="px-3 py-1 font-mono">{{.Target}}</td>
                <td class="px-3 py-1 text-xs text-slate-400 font-mono">{{.Detail}}</td>
            </tr>
        {{else}}
            <tr><td colspan="5" class="text-center text-slate-400 py-6">No audit entries yet.</td></tr>
        {{end}}
        </tbody>
    </table>
</div>
{{end}}
