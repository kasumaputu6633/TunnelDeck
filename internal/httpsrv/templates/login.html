{{define "login"}}{{template "base" .}}{{end}}

{{define "content"}}
<div class="max-w-sm mx-auto mt-16 bg-slate-800 border border-slate-700 rounded-lg p-6">
    <h1 class="text-xl font-semibold mb-1">Sign in</h1>
    <p class="text-sm text-slate-400 mb-4">TunnelDeck control plane</p>

    {{if .Data.Error}}<div class="mb-3 text-sm text-red-300">{{.Data.Error}}</div>{{end}}

    {{if .Data.DefaultPass}}
    <div class="mb-4 bg-amber-950 border border-amber-700 rounded p-3 text-xs">
        <div class="text-amber-300 font-semibold mb-1">Default credentials (change after login)</div>
        <div class="font-mono text-amber-200">username: <span class="select-all">{{.Data.DefaultUser}}</span></div>
        <div class="font-mono text-amber-200">password: <span class="select-all">{{.Data.DefaultPass}}</span></div>
    </div>
    {{end}}

    <form method="POST" action="/login" class="space-y-3">
        <div>
            <label class="block text-xs text-slate-400 mb-1">Username</label>
            <input name="username" autocomplete="username" required
                   value="{{.Data.DefaultUser}}"
                   class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm">
        </div>
        <div>
            <label class="block text-xs text-slate-400 mb-1">Password</label>
            <input name="password" type="password" autocomplete="current-password" required
                   class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm">
        </div>
        <button class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded px-3 py-2 text-sm">
            Sign in
        </button>
    </form>
</div>
{{end}}
