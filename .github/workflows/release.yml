name: Release

# Triggered by pushing a tag like v0.1.0. Builds Linux amd64 + arm64 binaries
# and uploads them plus install.sh to a GitHub Release. Users can then install
# via the one-liner:
#
#   curl -fsSL https://github.com/<owner>/tunneldeck/releases/latest/download/install.sh \
#     | sudo bash

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/tunneldeck-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/tunneldeck

      - uses: actions/upload-artifact@v4
        with:
          name: tunneldeck-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/tunneldeck-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum tunneldeck-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tunneldeck-linux-amd64
            dist/tunneldeck-linux-arm64
            dist/SHA256SUMS.txt
            scripts/install.sh
          generate_release_notes: true
